networks:
  patroni_network:
    name: patroni_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:
  etcd1:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: etcd1
    entrypoint: /usr/local/bin/etcd
    environment:
      - ETCDCTL_API=3
    command:
      - '--name=etcd1'
      - '--data-dir=/etcd_data'
      - '--initial-advertise-peer-urls=http://etcd1:2380'
      - '--listen-peer-urls=http://0.0.0.0:2380'
      - '--listen-client-urls=http://0.0.0.0:2379'
      - '--advertise-client-urls=http://etcd1:2379'
      - '--initial-cluster-token=patroni_etcd_cluster'
      - '--initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380'
      - '--initial-cluster-state=new'
    networks:
      patroni_network:
        ipv4_address: 172.20.0.11

  etcd2:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: etcd2
    entrypoint: /usr/local/bin/etcd
    environment:
      - ETCDCTL_API=3
    command:
      - '--name=etcd2'
      - '--data-dir=/etcd_data'
      - '--initial-advertise-peer-urls=http://etcd2:2380'
      - '--listen-peer-urls=http://0.0.0.0:2380'
      - '--listen-client-urls=http://0.0.0.0:2379'
      - '--advertise-client-urls=http://etcd2:2379'
      - '--initial-cluster-token=patroni_etcd_cluster'
      - '--initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380'
      - '--initial-cluster-state=new'
    networks:
      patroni_network:
        ipv4_address: 172.20.0.12

  etcd3:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: etcd3
    entrypoint: /usr/local/bin/etcd
    environment:
      - ETCDCTL_API=3
    command:
      - '--name=etcd3'
      - '--data-dir=/etcd_data'
      - '--initial-advertise-peer-urls=http://etcd3:2380'
      - '--listen-peer-urls=http://0.0.0.0:2380'
      - '--listen-client-urls=http://0.0.0.0:2379'
      - '--advertise-client-urls=http://etcd3:2379'
      - '--initial-cluster-token=patroni_etcd_cluster'
      - '--initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380'
      - '--initial-cluster-state=new'
    networks:
      patroni_network:
        ipv4_address: 172.20.0.13

  pg-node1:
    build: .
    container_name: pg-node1
    hostname: pg-node1
    volumes:
      - ./patroni.yml:/etc/patroni/patroni.yml:ro
    environment:
      - PATRONI_NAME=pg-node1
      - PATRONI_ETCD3_HOSTS=172.20.0.11:2379,172.20.0.12:2379,172.20.0.13:2379
      - PATRONI_RESTAPI_CONNECT_ADDRESS=172.20.0.21:8008
      - PATRONI_POSTGRESQL_LISTEN=0.0.0.0:5432
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=172.20.0.21:5432
    depends_on:
      - etcd1
      - etcd2
      - etcd3
    networks:
      patroni_network:
        ipv4_address: 172.20.0.21

  pg-node2:
    build: .
    container_name: pg-node2
    hostname: pg-node2
    volumes:
      - ./patroni.yml:/etc/patroni/patroni.yml:ro
    environment:
      - PATRONI_NAME=pg-node2
      - PATRONI_ETCD3_HOSTS=172.20.0.11:2379,172.20.0.12:2379,172.20.0.13:2379
      - PATRONI_RESTAPI_CONNECT_ADDRESS=172.20.0.22:8008
      - PATRONI_POSTGRESQL_LISTEN=0.0.0.0:5432
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=172.20.0.22:5432
    depends_on:
      - etcd1
      - etcd2
      - etcd3
    networks:
      patroni_network:
        ipv4_address: 172.20.0.22

  pg-node3:
    build: .
    container_name: pg-node3
    hostname: pg-node3
    volumes:
      - ./patroni.yml:/etc/patroni/patroni.yml:ro
    environment:
      - PATRONI_NAME=pg-node3
      - PATRONI_ETCD3_HOSTS=172.20.0.11:2379,172.20.0.12:2379,172.20.0.13:2379
      - PATRONI_RESTAPI_CONNECT_ADDRESS=172.20.0.23:8008
      - PATRONI_POSTGRESQL_LISTEN=0.0.0.0:5432
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=172.20.0.23:5432
    depends_on:
      - etcd1
      - etcd2
      - etcd3
    networks:
      patroni_network:
        ipv4_address: 172.20.0.23

  haproxy:
    image: haproxy:2.8-alpine
    container_name: haproxy
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "5000:5000"
      - "8404:8404"
    depends_on:
      - pg-node1
      - pg-node2
      - pg-node3
    networks:
      patroni_network:
        ipv4_address: 172.20.0.100