global
    maxconn 1000

defaults
    log global
    mode tcp
    retries 2
    timeout client 30m
    timeout connect 4s
    timeout server 30m
    timeout check 5s

listen stats
    mode http
    bind *:8404
    stats enable
    stats uri /
    stats refresh 2s
    stats show-node

listen postgres_write_proxy
    bind *:5000
    mode tcp
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 2s fall 2 rise 2 on-marked-down shutdown-sessions
    
    server pg-node1 172.20.0.21:5432 maxconn 100 check port 8008
    server pg-node2 172.20.0.22:5432 maxconn 100 check port 8008
    server pg-node3 172.20.0.23:5432 maxconn 100 check port 8008

# --- EOF ---
